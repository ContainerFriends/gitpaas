server {
    listen 80;
    server_name _;

    # El root apunta a la base de las webs
    root /usr/share/nginx/html;

    location /installer {
        alias /usr/share/nginx/html/installer/;
        index index.html;
        try_files $uri $uri/ /installer/index.html;
    }

    # Cache de assets (ahora la ruta física coincide con la URL)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache para el index
    location = /installer/index.html {
        add_header Cache-Control "no-cache";
    }
}