server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Captura las peticiones que vienen con el prefijo /installer
    location /installer/ {
        # 'alias' le dice a Nginx: "cuando pidan /installer/, busca en la raíz real"
        alias /usr/share/nginx/html/;
        # SPA fallback: si no encuentra el archivo, sirve el index.html
        try_files $uri $uri/ /installer/index.html;
    }

    # 2. Redirección si el usuario olvida la barra final (evita errores 404)
    location = /installer {
        return 301 $scheme://$http_host/installer/;
    }

    # 3. Cache de assets (JS, CSS, Imágenes)
    # Usamos una expresión regular para que funcione tanto si pide /assets/... como /installer/assets/...
    location ~* ^/(installer/)?assets/.*\.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 4. Evitar cache en el HTML principal para que siempre cargue la última versión
    location = /installer/index.html {
        add_header Cache-Control "no-cache";
    }

    # Opcional: Bloque por defecto para el resto de peticiones
    location / {
        try_files $uri $uri/ /index.html;
    }
}